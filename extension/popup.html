<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PDF Splitter</title>
<style>
body{
  font-family:Arial,sans-serif;
  width:340px;
  padding:10px;
}
button{
  width:100%;
  padding:8px;
  margin-bottom:8px;
}
textarea{
  width:100%;
  height:120px;
  margin-bottom:8px;
}
.small{
  font-size:12px;
  color:#555;
  margin-bottom:8px;
  word-break:break-word;
}
</style>
</head>
<body>

<div id="file" class="small">No file loaded</div>

<button id="run">Scan Current PDF</button>
<button id="copy">Copy Range</button>

<textarea id="out" placeholder="Page range appears here..."></textarea>

<div id="status" class="small">Ready.</div>

<script src="pdf.min.js"></script>
<script src="popup.js"></script>

</body>
</html>
